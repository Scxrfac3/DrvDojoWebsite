[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.18.0"

[functions]
  directory = "netlify/functions"

# ─────────────────────────────────────────────────────────────
# HEADERS
# ─────────────────────────────────────────────────────────────

# Security headers for all requests
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "payment=(self \"https://calendly.com\")"

# Caching headers for static assets (long-lived, fingerprinted)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML responses should not be cached (SPA - always serve fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─────────────────────────────────────────────────────────────
# PRERENDER.IO NETLIFY EXTENSION CONFIGURATION
# ─────────────────────────────────────────────────────────────
# The official Prerender Netlify Extension works at the edge/CDN level.
# It intercepts requests from crawlers (Googlebot, Bingbot, etc.) and
# serves pre-rendered HTML snapshots automatically.
#
# The extension is configured via the Netlify Dashboard UI (Extensions tab).
# These headers ensure the extension and our SPA work together properly.

# Tell Prerender which user agents to intercept
# These are defaults used by the extension, included here for clarity
[[headers]]
  for = "/*"
  [headers.values]
    # Allow Prerender's crawler to access the site
    X-Robots-Tag = "index, follow"

# Ensure API endpoints are NOT prerendered (they return JSON)
[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

# Ensure Netlify Functions are NOT prerendered
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

# ─────────────────────────────────────────────────────────────
# REDIRECTS (order matters — first match wins)
# ─────────────────────────────────────────────────────────────

# --- TRAILING SLASH NORMALISATION ---
# Remove trailing slashes to prevent duplicate content & redirect loops.
# Netlify treats /page and /page/ as the same resource with SPA catch-all,
# which causes infinite redirects if React Router also redirects on slashes.
# These rules normalise everything to no trailing slash.
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = true
  conditions = {Language = []}

# --- API ENDPOINTS → NETLIFY FUNCTIONS ---
# Must come BEFORE the catch-all SPA redirect
[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/get-checkout-session"
  to = "/.netlify/functions/get-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/create-supersaas-booking"
  to = "/.netlify/functions/create-supersaas-booking"
  status = 200
  force = true

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true

# --- HTTP → HTTPS ---
[[redirects]]
  from = "/*"
  to = "https://drivedojodrivingschool.com/:splat"
  status = 301
  force = true
  conditions = {Protocol = "http"}

# --- WWW → NON-WWW (canonical domain) ---
[[redirects]]
  from = "https://www.drivedojodrivingschool.com/*"
  to = "https://drivedojodrivingschool.com/:splat"
  status = 301
  force = true

