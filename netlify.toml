[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18.18.0"

[functions]
  directory = "netlify/functions"

# Force HTTPS redirect
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Redirect API endpoints to Netlify Functions
# These must come BEFORE the catch-all redirect
[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/get-checkout-session"
  to = "/.netlify/functions/get-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/create-supersaas-booking"
  to = "/.netlify/functions/create-supersaas-booking"
  status = 200
  force = true

[[redirects]]
  from = "/api/stripe-webhook"
  to = "https://shdxtqktxjxpwwtqlllf.supabase.co/functions/v1/stripe-webhook"
  status = 200
  force = true

# HTTP to HTTPS redirect for all pages
[[redirects]]
  from = "/*"
  to = "https://drivedojodrivingschool.com/:splat"
  status = 301
  force = true
